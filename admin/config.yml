backend:
  name: git-gateway
  branch: main
media_folder: uploads
public_folder: /uploads
collections:
  - name: drifts
    label: Drifts
    folder: content/drifts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Message
        name: message
        widget: string
      - label: Name
        name: name
        widget: string
        required: false
  - name: settings
    label: Site Settings
    files:
      - name: bio
        label: Bio and Description
        file: content/settings/bio.json
        fields:
          - label: Your Name
            name: name
            widget: string
          - label: Bio
            name: HeroBio
            widget: text
          - label: Hero Description
            name: description
            widget: text
          - label: Portrait Photo
            name: portrait
            widget: image
            required: false
  - name: essays
    label: Essays
    folder: content/essays
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
      - label: Excerpt
        name: excerpt
        widget: text
        required: false
      - label: Cover Image
        name: cover
        widget: image
        required: false
      - label: Body
        name: body
        widget: markdown
  - name: albums
    label: Albums
    folder: content/albums
    create: true
    slug: "{{slug}}"
    fields:
      - label: Album Title
        name: title
        widget: string
      - label: Year
        name: year
        widget: string
        required: false
      - label: Album Subtit
